<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Web Serial Console</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--bg2:#161822;--bg3:#1e2030;--bg4:#282a3a;--bg5:#363950;
  --fg:#c8d3f5;--fg2:#a0aac0;--fg3:#636d8a;
  --accent:#82aaff;--green:#c3e88d;--yellow:#ffc777;--red:#ff757f;
  --purple:#c099ff;--cyan:#86e1fc;--orange:#ff966c;--teal:#4fd6be;
  --border:#2f3146;--font:'SF Mono','Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace;
  --r:8px;--rs:5px
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--fg);display:flex;flex-direction:column;font-size:13px}

/* ADDED: Flexbox layout for the main app wrapper */
#app {
  display: flex;
  flex-direction: column;
  flex: 1;
  height: 100%;
  overflow: hidden;
}

#toolbar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;z-index:10;flex-shrink:0}
.tg{display:flex;align-items:center;gap:5px}
.ts{width:1px;height:24px;background:var(--border);margin:0 6px}
#toolbar button{padding:5px 14px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg4);color:var(--fg);cursor:pointer;font-family:var(--font);font-size:12px;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
#toolbar button:hover{background:var(--bg5);border-color:var(--accent)}
#toolbar button.primary{background:var(--accent);color:#0f1117;border-color:var(--accent);font-weight:600}
#toolbar button.primary:hover{opacity:.85}
#toolbar button.danger{border-color:var(--red);color:var(--red)}
#toolbar button.danger:hover{background:var(--red);color:#0f1117}
#toolbar select,#toolbar input[type=text]{padding:5px 8px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg4);color:var(--fg);font-family:var(--font);font-size:12px;outline:none}
#toolbar select:focus,#toolbar input:focus{border-color:var(--accent)}
#toolbar select{cursor:pointer}
#status-dot{width:8px;height:8px;border-radius:50%;background:var(--red);transition:background .3s;flex-shrink:0}
#status-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
#status-text{font-size:11px;color:var(--fg3);white-space:nowrap;max-width:260px;overflow:hidden;text-overflow:ellipsis}
#throughput{font-size:10px;color:var(--teal);white-space:nowrap;min-width:60px;text-align:right}
#panels-container{flex:1;display:flex;overflow:hidden;min-height:0}
.panel{display:flex;flex-direction:column;min-width:0;background:var(--bg);border-right:1px solid var(--border)}
.panel:last-child{border-right:none}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--border);gap:6px;flex-shrink:0;min-height:36px}
.panel-title{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden}
.panel-title .icon{font-size:14px}
.badge{background:var(--bg5);color:var(--fg2);font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;min-width:22px;text-align:center}
.panel-actions{display:flex;gap:3px;flex-shrink:0}
.panel-actions button{width:26px;height:26px;border:none;border-radius:var(--rs);background:transparent;color:var(--fg3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.panel-actions button:hover{background:var(--bg4);color:var(--fg)}
.panel-actions button.active{color:var(--accent)}
.panel-actions button.close-btn:hover{background:var(--red);color:#fff}
.panel-filter{font-size:10px;color:var(--fg3);padding:3px 10px;background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0}
.panel-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:2px 0;font-size:12.5px;line-height:1.6;min-height:0;contain:strict;will-change:transform}
.log-line{padding:0 10px;white-space:pre-wrap;word-break:break-all;content-visibility:auto;contain-intrinsic-size:auto 20px}
.log-line:hover{background:var(--bg3)}
.log-info{color:var(--cyan)}.log-warn{color:var(--yellow)}.log-error{color:var(--red);font-weight:500}
.log-debug{color:var(--fg3)}.log-verbose{color:var(--fg3);opacity:.7}
.log-prompt{color:var(--green);font-weight:600}
.log-system{color:var(--purple);font-style:italic;text-align:center;padding:4px 10px;background:var(--bg3);border-bottom:1px solid var(--border)}
.resize-handle{flex:0 0 5px;background:var(--border);cursor:col-resize;position:relative;transition:background .15s;z-index:5}
.resize-handle:hover,.resize-handle.active{background:var(--accent)}
.resize-handle::after{content:'';position:absolute;top:0;left:-3px;right:-3px;bottom:0}
#command-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg2);border-top:1px solid var(--border);flex-shrink:0}
#cmd-prompt{color:var(--green);font-weight:700;font-size:14px;flex-shrink:0}
#cmd-wrap{position:relative;flex:1;display:flex;align-items:center}
#command-input{width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg4);color:var(--fg);font-family:var(--font);font-size:13px;outline:none}
#command-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(130,170,255,.15)}
#command-input::placeholder{color:var(--fg3)}
#send-btn{padding:7px 18px;border:1px solid var(--accent);border-radius:var(--rs);background:var(--accent);color:#0f1117;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
#send-btn:hover{opacity:.85}
#send-btn:disabled{opacity:.4;cursor:not-allowed}
#hist-dd{position:absolute;bottom:calc(100% + 4px);left:0;right:0;max-height:220px;overflow-y:auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 -4px 20px rgba(0,0,0,.4);display:none;z-index:100}
#hist-dd.show{display:block}
.hi{padding:6px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi:hover{background:var(--bg4)}
.hi:last-child{border-bottom:none}
.hi.sel{background:var(--bg5);color:var(--accent)}
#hist-info{font-size:10px;color:var(--fg3);white-space:nowrap;flex-shrink:0}
.cmd-sel{padding:5px 4px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg4);color:var(--fg);font-family:var(--font);font-size:11px;outline:none;cursor:pointer}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px;width:440px;max-width:90vw;box-shadow:0 8px 40px rgba(0,0,0,.5);transform:translateY(10px);transition:transform .2s}
.modal-overlay.show .modal{transform:translateY(0)}
.modal h3{margin-bottom:18px;font-size:16px;display:flex;align-items:center;gap:8px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:11px;color:var(--fg2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fg input[type=text],.fg select{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg4);color:var(--fg);font-family:var(--font);font-size:13px;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--accent)}
.fg .cbl{display:flex;align-items:center;gap:8px;font-size:12px;cursor:pointer}
.fg input[type=checkbox]{accent-color:var(--accent);width:15px;height:15px;cursor:pointer}
.ma{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.ma button{padding:7px 18px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg4);color:var(--fg);font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s}
.ma button:hover{background:var(--bg5)}
.ma button.primary{background:var(--accent);color:#0f1117;border-color:var(--accent);font-weight:600}
.ma button.primary:hover{opacity:.85}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--fg3)}
.err-scr{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px;gap:12px}
.err-scr h1{color:var(--yellow);font-size:22px}
.err-scr p{color:var(--fg2);font-size:14px;max-width:500px;line-height:1.6}
.err-scr a{color:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.pulse{animation:pulse 1s infinite}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <div class="tg">
      <button id="conn-btn" class="primary" onclick="toggleConnection()"><span id="conn-ico">🔌</span><span id="conn-lbl">Connect</span></button>
      <select id="baud-rate" title="Baud Rate">
        <option value="9600">9600</option><option value="19200">19200</option>
        <option value="38400">38400</option><option value="57600">57600</option>
        <option value="115200" selected>115200</option><option value="230400">230400</option>
        <option value="460800">460800</option><option value="921600">921600</option>
        <option value="1500000">1500000</option><option value="2000000">2000000</option>
      </select>
    </div>
    <div class="ts"></div>
    <div class="tg">
      <button onclick="showFilterModal()">➕ Filter</button>
      <button onclick="clearAll()">🗑️ Clear</button>
      <button onclick="exportLogs()">💾 Export</button>
      <button onclick="loadDemo()">📝 Demo</button>
    </div>
    <div class="ts"></div>
    <div class="tg" style="margin-left:auto">
      <span id="throughput"></span>
      <div id="status-dot"></div>
      <span id="status-text">Disconnected</span>
    </div>
  </div>

  <div id="panels-container">
    <div class="panel" data-id="main" style="flex:1 1 0px">
      <div class="panel-header">
        <div class="panel-title"><span class="icon">📋</span> All Logs <span class="badge" id="badge-main">0</span></div>
        <div class="panel-actions">
          <button onclick="clearPanel('main')" title="Clear">🗑</button>
          <button class="active" id="as-main" onclick="toggleAS('main')" title="Auto-scroll">⬇️</button>
        </div>
      </div>
      <div class="panel-body" id="log-main"></div>
    </div>
  </div>

  <div id="command-bar">
    <span id="cmd-prompt">&gt;</span>
    <div id="cmd-wrap">
      <div id="hist-dd"></div>
      <input type="text" id="command-input" placeholder="Enter command… (↑↓ history, Tab complete)" autocomplete="off" spellcheck="false">
    </div>
    <select id="cmd-eol" class="cmd-sel" title="Line Ending">
      <option value="\r\n">CRLF</option><option value="\n">LF</option><option value="\r">CR</option><option value="">None</option>
    </select>
    <button id="send-btn" onclick="sendCmd()">Send</button>
    <button onclick="toggleHist()" title="History" style="padding:5px 8px;border:1px solid var(--border);border-radius:var(--rs);background:var(--bg4);color:var(--fg3);cursor:pointer;font-size:14px">📜</button>
    <span id="hist-info"></span>
  </div>
</div>

<div id="filter-modal" class="modal-overlay" onclick="if(event.target===this)closeFilterModal()">
  <div class="modal">
    <h3>🔍 Add Filter Panel</h3>
    <div class="fg"><label>Preset</label>
      <select id="fp" onchange="applyPreset()">
        <option value="">— Custom —</option>
        <option value="ConsolePrompt::^(?![I|E]).*$">🟢 Console Prompt</option>
        <option value="Errors::^E \\(|1">🔴 Errors</option>
        <option value="Warnings::^W \\(|1">🟡 Warnings</option>
        <option value="mbedTLS::mbedtls|0">🔐 mbedTLS</option>
        <option value="WiFi::wifi|0">📶 WiFi</option>
        <option value="Heap::heap|0">🧠 Heap/Memory</option>
      </select>

    </div>
    <div class="fg"><label>Panel Name</label><input type="text" id="fn" placeholder="e.g. TLS Handshake"></div>
    <div class="fg"><label>Match Pattern</label><input type="text" id="fpt" placeholder="e.g. mbedtls or ^E \\("></div>
    <div class="fg"><label class="cbl"><input type="checkbox" id="fr" checked> Use Regular Expression</label></div>
    <div class="ma"><button onclick="closeFilterModal()">Cancel</button><button class="primary" onclick="addFilter()">Add Panel</button></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  CONFIGURATION
// ══════════════════════════════════════════════════
const CFG = {
  MAX_RAW:        100000,   // raw lines in memory for export
  TRIM_RAW:        80000,
  MAX_DOM:          2000,   // max DOM elements per panel (auto-scroll on)
  MAX_DOM_PAUSED:   6000,   // max DOM elements when user scrolled up
  PROCESS_MS:         50,   // buffer → lines interval
  RENDER_MS:          80,   // min ms between DOM flushes
  PARTIAL_MS:        250,   // flush partial (prompt) after silence
};

// ══════════════════════════════════════════════════
//  PANEL STATE
// ══════════════════════════════════════════════════
class Panel {
  constructor(id, el) {
    this.id = id;
    this.el = el;               // .panel-body element
    this.buf = [];              // pending HTML fragments
    this.total = 0;
    this.autoScroll = true;
    this._skipScroll = false;
    this._sTimer = null;
    el.addEventListener('scroll', () => {
      if (this._skipScroll) return;
      if (this._sTimer) return;
      this._sTimer = setTimeout(() => {
        this._sTimer = null;
        const e = this.el;
        const atBot = e.scrollHeight - e.scrollTop - e.clientHeight < 60;
        if (this.autoScroll !== atBot) {
          this.autoScroll = atBot;
          updateASBtn(this.id, atBot);
        }
      }, 120);
    }, { passive: true });
  }
  push(html) { this.buf.push(html); this.total++; }
  get dirty() { return this.buf.length > 0; }
  flush() {
    if (!this.buf.length) return;
    this.el.insertAdjacentHTML('beforeend', this.buf.join(''));
    this.buf.length = 0;
    const cap = this.autoScroll ? CFG.MAX_DOM : CFG.MAX_DOM_PAUSED;
    const n = this.el.children.length;
    if (n > cap) {
      const rm = n - cap;
      const r = document.createRange();
      r.setStartBefore(this.el.firstChild);
      r.setEndAfter(this.el.children[rm - 1]);
      r.deleteContents();
    }
    if (this.autoScroll) {
      this._skipScroll = true;
      this.el.scrollTop = this.el.scrollHeight;
      requestAnimationFrame(() => this._skipScroll = false);
    }
    updBadge(this.id, this.total);
  }
  clear() {
    this.el.innerHTML = '';
    this.buf.length = 0;
    this.total = 0;
    updBadge(this.id, 0);
  }
}

// ══════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════
let port = null, reader = null, connected = false;
let inBuf = '', lineBuf = '';
let rawLines = [];          // all raw lines for export
const panels = new Map();   // id → Panel
let filters = [];           // {id,name,pattern,isRegex,compiled,lower}
let cmdHist = [], histIdx = -1, histSaved = '';
let lps = 0, throughput = 0;
let lastRender = 0, partialTmr = null, tabVis = true;
const decoder = new TextDecoder();

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  if (!('serial' in navigator)) {
    document.getElementById('app').innerHTML =
      `<div class="err-scr"><h1>⚠️ Web Serial Not Supported</h1>
       <p>Use <a href="https://www.google.com/chrome/">Chrome</a> or
       <a href="https://www.microsoft.com/edge">Edge</a> 89+ on desktop via HTTPS / localhost.</p></div>`;
    return;
  }
  panels.set('main', new Panel('main', document.getElementById('log-main')));
  loadState();
  setInterval(processBuffer, CFG.PROCESS_MS);
  requestAnimationFrame(renderLoop);
  setInterval(() => { throughput = lps; lps = 0; updThroughput(); }, 1000);
  document.addEventListener('visibilitychange', () => { tabVis = !document.hidden; });
  navigator.serial.addEventListener('disconnect', e => {
    if (port && e.target === port) { connected = false; port = reader = null; updConnUI(); sysMsg('⚠ Device disconnected'); }
  });
  setupInput();
  sysMsg('Ready — click Connect to begin.');
});

// ══════════════════════════════════════════════════
//  SERIAL
// ══════════════════════════════════════════════════
async function toggleConnection() { connected ? await doDisconnect() : await doConnect(); }

async function doConnect() {
  try {
    port = await navigator.serial.requestPort();
    const baud = +document.getElementById('baud-rate').value;
    await port.open({ baudRate: baud });
    connected = true; updConnUI();
    const i = port.getInfo();
    sysMsg(`✓ Connected ${i.usbVendorId ? `USB ${i.usbVendorId}:${i.usbProductId} ` : ''}@ ${baud} baud`);
    readLoop();
  } catch (e) { if (e.name !== 'NotFoundError') sysMsg('✗ ' + e.message); }
}

async function doDisconnect() {
  connected = false;
  try { if (reader) { await reader.cancel(); reader = null; } if (port) { await port.close(); port = null; } } catch {}
  updConnUI(); sysMsg('Disconnected');
}

async function readLoop() {
  while (port?.readable && connected) {
    try {
      reader = port.readable.getReader();
      for (;;) { const { value, done } = await reader.read(); if (done) break; inBuf += decoder.decode(value, { stream: true }); }
    } catch (e) { if (connected) console.error(e); }
    finally { try { reader?.releaseLock(); } catch {} reader = null; }
  }
}

// ══════════════════════════════════════════════════
//  PROCESSING  (timer — decoupled from reads)
// ══════════════════════════════════════════════════
function processBuffer() {
  if (!inBuf) return;
  let t = inBuf; inBuf = '';
  t = t.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  t = lineBuf + t; lineBuf = '';
  const parts = t.split('\n');
  lineBuf = parts.pop() || '';

  if (lineBuf && /^[a-zA-Z_]+>\s*$/.test(lineBuf)) { parts.push(lineBuf); lineBuf = ''; }

  clearTimeout(partialTmr);
  if (lineBuf) partialTmr = setTimeout(() => { if (lineBuf) { addLine(lineBuf); lineBuf = ''; } }, CFG.PARTIAL_MS);

  for (let i = 0; i < parts.length; i++) addLine(parts[i]);
}

function addLine(raw) {
  rawLines.push(raw);
  if (rawLines.length > CFG.MAX_RAW) rawLines = rawLines.slice(-CFG.TRIM_RAW);
  lps++;
  const h = `<div class="log-line">${colorize(raw)}</div>`;
  panels.get('main').push(h);
  for (let i = 0; i < filters.length; i++) {
    if (testF(raw, filters[i])) { const p = panels.get(filters[i].id); if (p) p.push(h); }
  }
}

// ══════════════════════════════════════════════════
//  RENDERING  (rAF — throttled)
// ══════════════════════════════════════════════════
function renderLoop(ts) {
  requestAnimationFrame(renderLoop);
  if (!tabVis || ts - lastRender < CFG.RENDER_MS) return;
  let any = false;
  for (const p of panels.values()) if (p.dirty) { any = true; break; }
  if (!any) return;
  lastRender = ts;
  for (const p of panels.values()) p.flush();
}

// ══════════════════════════════════════════════════
//  COLORIZE
// ══════════════════════════════════════════════════
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function colorize(l) {
  const e = esc(l);
  const c = l.charCodeAt(0);
  if (c===69&&/^E\s*\(/.test(l)) return `<span class="log-error">${e}</span>`;
  if (c===87&&/^W\s*\(/.test(l)) return `<span class="log-warn">${e}</span>`;
  if (c===73&&/^I\s*\(/.test(l)) return `<span class="log-info">${e}</span>`;
  if (c===68&&/^D\s*\(/.test(l)) return `<span class="log-debug">${e}</span>`;
  if (c===86&&/^V\s*\(/.test(l)) return `<span class="log-verbose">${e}</span>`;
  if (/^[a-zA-Z_]+>\s*/.test(l)) return `<span class="log-prompt">${e}</span>`;
  return e;
}

// ══════════════════════════════════════════════════
//  FILTER MATCHING
// ══════════════════════════════════════════════════
function compileF(f) {
  if (f.isRegex) { try { f.compiled = new RegExp(f.pattern, 'i'); } catch { f.compiled = null; } f.lower = null; }
  else { f.compiled = null; f.lower = f.pattern.toLowerCase(); }
}
function testF(line, f) {
  if (f.compiled) return f.compiled.test(line);
  return line.toLowerCase().includes(f.lower);
}

// ══════════════════════════════════════════════════
//  SYSTEM MESSAGES
// ══════════════════════════════════════════════════
function sysMsg(t) {
  const h = `<div class="log-line log-system">── ${esc(t)} ── ${new Date().toLocaleTimeString()}</div>`;
  panels.get('main').push(h);
}

// ══════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════
function updBadge(id, n) {
  const el = document.getElementById('badge-' + id);
  if (el) el.textContent = n >= 1000 ? (n/1000).toFixed(1)+'k' : n;
}
function updateASBtn(id, on) {
  const b = document.getElementById('as-' + id);
  if (b) b.classList.toggle('active', on);
}
function toggleAS(id) {
  const p = panels.get(id); if (!p) return;
  p.autoScroll = !p.autoScroll;
  updateASBtn(id, p.autoScroll);
  if (p.autoScroll) p.el.scrollTop = p.el.scrollHeight;
}
function updThroughput() {
  const el = document.getElementById('throughput');
  el.textContent = throughput > 0 ? throughput.toLocaleString() + ' L/s' : '';
  el.style.color = throughput > 5000 ? 'var(--yellow)' : throughput > 1000 ? 'var(--orange)' : 'var(--teal)';
}
function updConnUI() {
  const b = document.getElementById('conn-btn'), d = document.getElementById('status-dot');
  const t = document.getElementById('status-text'), l = document.getElementById('conn-lbl'), i = document.getElementById('conn-ico');
  if (connected) {
    b.className = 'danger'; l.textContent = 'Disconnect'; i.textContent = '⏏️';
    d.classList.add('on');
    const info = port?.getInfo() || {};
    t.textContent = `Connected @ ${document.getElementById('baud-rate').value}` + (info.usbVendorId ? ` (${info.usbVendorId}:${info.usbProductId})` : '');
  } else {
    b.className = 'primary'; l.textContent = 'Connect'; i.textContent = '🔌';
    d.classList.remove('on'); t.textContent = 'Disconnected';
  }
}
function clearPanel(id) { const p = panels.get(id); if (p) p.clear(); }
function clearAll() { for (const p of panels.values()) p.clear(); rawLines.length = 0; }

// ══════════════════════════════════════════════════
//  FILTER PANELS
// ══════════════════════════════════════════════════
function addFilterPanel(name, pattern, isRegex, skipSave) {
  const id = 'f' + Date.now().toString(36) + Math.random().toString(36).slice(2,5);
  const fc = { id, name, pattern, isRegex }; compileF(fc); filters.push(fc);
  const ctr = document.getElementById('panels-container');

  const handle = document.createElement('div');
  handle.className = 'resize-handle'; handle.dataset.for = id; ctr.appendChild(handle); initResize(handle);

  const div = document.createElement('div');
  div.className = 'panel'; div.dataset.id = id; div.style.flex = '1 1 0px';
  div.innerHTML = `<div class="panel-header">
    <div class="panel-title"><span class="icon">🔍</span><span title="${esc(name)}">${esc(name)}</span><span class="badge" id="badge-${id}">0</span></div>
    <div class="panel-actions">
      <button onclick="clearPanel('${id}')" title="Clear">🗑</button>
      <button class="active" id="as-${id}" onclick="toggleAS('${id}')" title="Auto-scroll">⬇️</button>
      <button class="close-btn" onclick="rmFilter('${id}')" title="Remove">✕</button>
    </div></div>
    <div class="panel-filter">Pattern: ${esc(pattern)} ${isRegex?'(regex)':'(text)'}</div>
    <div class="panel-body" id="log-${id}"></div>`;
  ctr.appendChild(div);

  const panel = new Panel(id, document.getElementById('log-' + id));
  panels.set(id, panel);

  // Populate from history in chunks (non-blocking)
  let idx = 0;
  const CHUNK = 3000;
  (function populate() {
    const end = Math.min(idx + CHUNK, rawLines.length);
    const batch = [];
    for (; idx < end; idx++) {
      if (testF(rawLines[idx], fc)) batch.push(`<div class="log-line">${colorize(rawLines[idx])}</div>`);
    }
    if (batch.length) { panel.el.insertAdjacentHTML('beforeend', batch.join('')); panel.total += batch.length; }
    if (idx < rawLines.length) setTimeout(populate, 0);
    else { panel.flush(); updBadge(id, panel.total); if (panel.autoScroll) panel.el.scrollTop = panel.el.scrollHeight; }
  })();

  if (!skipSave) saveState();
}

function rmFilter(id) {
  filters = filters.filter(f => f.id !== id);
  panels.delete(id);
  const ctr = document.getElementById('panels-container');
  ctr.querySelector(`[data-id="${id}"]`)?.remove();
  ctr.querySelector(`[data-for="${id}"]`)?.remove();
  ctr.querySelectorAll('.panel').forEach(p => p.style.flex = '1 1 0px');
  saveState();
}

// ══════════════════════════════════════════════════
//  RESIZE HANDLES
// ══════════════════════════════════════════════════
function initResize(handle) {
  handle.addEventListener('mousedown', startR);
  handle.addEventListener('touchstart', startR, { passive: false });
  function startR(e) {
    e.preventDefault();
    const ctr = document.getElementById('panels-container');
    const ps = [...ctr.querySelectorAll('.panel')];
    const hs = [...ctr.querySelectorAll('.resize-handle')];
    const hi = hs.indexOf(handle);
    let li = 0, c = 0;
    for (const ch of ctr.children) { if (ch === handle) break; if (ch.classList.contains('panel')) c++; }
    const lp = ps[c-1], rp = ps[c];
    if (!lp || !rp) return;
    const sx = e.clientX||(e.touches&&e.touches[0].clientX);
    const lw = lp.getBoundingClientRect().width, rw = rp.getBoundingClientRect().width;
    lp.style.flex = `0 0 ${lw}px`; rp.style.flex = `0 0 ${rw}px`;
    handle.classList.add('active'); document.body.style.cursor='col-resize'; document.body.style.userSelect='none';
    const onM = ev => {
      const x = ev.clientX||(ev.touches&&ev.touches[0].clientX);
      const d = x - sx;
      lp.style.flex = `0 0 ${Math.max(100,lw+d)}px`;
      rp.style.flex = `0 0 ${Math.max(100,rw-d)}px`;
    };
    const onU = () => {
      handle.classList.remove('active'); document.body.style.cursor=''; document.body.style.userSelect='';
      document.removeEventListener('mousemove',onM); document.removeEventListener('mouseup',onU);
      document.removeEventListener('touchmove',onM); document.removeEventListener('touchend',onU);
    };
    document.addEventListener('mousemove',onM);document.addEventListener('mouseup',onU);
    document.addEventListener('touchmove',onM,{passive:false});document.addEventListener('touchend',onU);
  }
}

// ══════════════════════════════════════════════════
//  FILTER MODAL
// ══════════════════════════════════════════════════
function showFilterModal() {
  document.getElementById('fn').value=''; document.getElementById('fpt').value='';
  document.getElementById('fr').checked=true; document.getElementById('fp').value='';
  document.getElementById('filter-modal').classList.add('show');
  setTimeout(()=>document.getElementById('fn').focus(),100);
}
function closeFilterModal() { document.getElementById('filter-modal').classList.remove('show'); }
function applyPreset() {
  const v=document.getElementById('fp').value; if(!v)return;
  const[n,p,r]=v.split('::');
  document.getElementById('fn').value=n; document.getElementById('fpt').value=p; document.getElementById('fr').checked=r==='1';
}
function addFilter() {
  const n=document.getElementById('fn').value.trim(), p=document.getElementById('fpt').value.trim(), r=document.getElementById('fr').checked;
  if(!n||!p){alert('Name and pattern required.');return;}
  if(r){try{new RegExp(p)}catch(e){alert('Bad regex: '+e.message);return;}}
  addFilterPanel(n,p,r); closeFilterModal();
}

// ══════════════════════════════════════════════════
//  COMMAND INPUT
// ══════════════════════════════════════════════════
function setupInput() {
  const inp = document.getElementById('command-input');
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); sendCmd(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); navHist(-1); }
    else if (e.key === 'ArrowDown') { e.preventDefault(); navHist(1); }
    else if (e.key === 'Escape') { inp.value = ''; hideHist(); }
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { const m=document.getElementById('filter-modal'); if(m.classList.contains('show'))closeFilterModal(); }
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('#hist-dd') && !e.target.closest('[onclick*="toggleHist"]')) hideHist();
  });
}

async function sendCmd() {
  const inp = document.getElementById('command-input');
  const cmd = inp.value;
  if (connected && port?.writable) {
    try {
      const w = port.writable.getWriter();
      const eol = document.getElementById('cmd-eol').value.replace(/\\r/g,'\r').replace(/\\n/g,'\n');
      await w.write(new TextEncoder().encode(cmd + eol));
      w.releaseLock();
    } catch(e) { sysMsg('Send error: '+e.message); }
  } else if (cmd.trim()) {
    sysMsg('Not connected — "'+cmd+'" not sent');
  }
  if (cmd.trim()) {
    if (cmdHist[cmdHist.length-1] !== cmd) cmdHist.push(cmd);
    if (cmdHist.length > 500) cmdHist = cmdHist.slice(-500);
    histIdx = -1; histSaved = ''; saveState(); updHistInfo();
  }
  inp.value = ''; inp.focus();
}

function navHist(d) {
  const inp = document.getElementById('command-input');
  if (!cmdHist.length) return;
  if (d===-1) {
    if (histIdx===-1) { histSaved=inp.value; histIdx=cmdHist.length-1; }
    else histIdx=Math.max(0,histIdx-1);
    inp.value=cmdHist[histIdx];
  } else {
    if (histIdx===-1) return;
    histIdx++;
    inp.value = histIdx>=cmdHist.length ? (histIdx=-1, histSaved) : cmdHist[histIdx];
  }
  setTimeout(()=>inp.setSelectionRange(inp.value.length,inp.value.length),0);
}

let histDDIdx = -1;
function toggleHist() {
  const dd = document.getElementById('hist-dd');
  if (dd.classList.contains('show')) { hideHist(); return; }
  dd.innerHTML = '';
  histDDIdx = -1;
  if (!cmdHist.length) { dd.innerHTML='<div class="hi" style="color:var(--fg3)">No history</div>'; }
  else {
    const s = cmdHist.slice(-50).reverse();
    s.forEach((c,i) => {
      const d = document.createElement('div'); d.className='hi'; d.textContent=c;
      d.onclick = () => { document.getElementById('command-input').value=c; document.getElementById('command-input').focus(); hideHist(); };
      dd.appendChild(d);
    });
  }
  dd.classList.add('show');
}
function hideHist() { document.getElementById('hist-dd').classList.remove('show'); histDDIdx=-1; }
function updHistInfo() { document.getElementById('hist-info').textContent = cmdHist.length ? cmdHist.length+' cmd'+(cmdHist.length>1?'s':'') : ''; }

// ══════════════════════════════════════════════════
//  EXPORT
// ══════════════════════════════════════════════════
function exportLogs() {
  if (!rawLines.length) { alert('No logs.'); return; }
  const b = new Blob([rawLines.join('\n')],{type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = `serial-${new Date().toISOString().replace(/[:.]/g,'-')}.log`;
  a.click(); URL.revokeObjectURL(a.href);
}

// ══════════════════════════════════════════════════
//  PERSISTENCE
// ══════════════════════════════════════════════════
function saveState() {
  try {
    localStorage.setItem('wsc_f', JSON.stringify(filters.map(f=>({name:f.name,pattern:f.pattern,isRegex:f.isRegex}))));
    localStorage.setItem('wsc_h', JSON.stringify(cmdHist.slice(-500)));
    localStorage.setItem('wsc_b', document.getElementById('baud-rate').value);
  } catch{}
}
function loadState() {
  try {
    const b=localStorage.getItem('wsc_b'); if(b) document.getElementById('baud-rate').value=b;
    const h=localStorage.getItem('wsc_h'); if(h){cmdHist=JSON.parse(h);updHistInfo();}
    const f=localStorage.getItem('wsc_f'); if(f) JSON.parse(f).forEach(x=>addFilterPanel(x.name,x.pattern,x.isRegex,true));
  } catch(e){console.error(e);}
}
